<!DOCTYPE html>
<html>
<head>
  <script type="module" src="http://localhost:3001/@vite/client"></script>
<script src="http://localhost:3001/@id/virtual:wxt-html-plugins" type="module"></script>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 320px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 16px; background: #0a0a0a; color: #fafafa; }
    h1 { font-size: 16px; font-weight: 600; margin-bottom: 12px; }
    .status { font-size: 12px; color: #888; margin-bottom: 16px; }
    .status .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
    .dot.connected { background: #22c55e; }
    .dot.disconnected { background: #ef4444; }
    input { width: 100%; padding: 10px; border: 1px solid #333; border-radius: 8px; background: #1a1a1a; color: #fafafa; font-size: 16px; text-align: center; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 12px; }
    input::placeholder { letter-spacing: normal; color: #555; }
    button { width: 100%; padding: 10px; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; }
    .btn-primary { background: #3b82f6; color: white; }
    .btn-primary:hover { background: #2563eb; }
    .btn-primary:disabled { background: #333; color: #666; cursor: not-allowed; }
    .btn-danger { background: #dc2626; color: white; margin-top: 8px; }
    .btn-danger:hover { background: #b91c1c; }
    .btn-resolve { background: #22c55e; color: white; font-size: 16px; padding: 14px; }
    .btn-resolve:hover { background: #16a34a; }
    .error { color: #ef4444; font-size: 12px; margin-bottom: 8px; }
    .session { padding: 12px; background: #1a1a1a; border-radius: 8px; margin-bottom: 12px; }
    .session .service { font-weight: 600; font-size: 14px; }
    .session .hint { font-size: 12px; color: #888; margin-top: 4px; }
    .hidden { display: none; }
    .section { margin-bottom: 16px; }
  </style>  <script type="module" crossorigin="" src="/chunks/reload-html-DgxZVhVL.js"></script>
</head>
<body>
  <h1>AuthLoop</h1>

  <!-- Pairing form (shown when not paired) -->
  <div id="pairing-view">
    <p class="status">Enter the pairing code from your AuthLoop dashboard.</p>
    <input id="code-input" type="text" maxlength="6" placeholder="ABC123" autocomplete="off">
    <p id="pair-error" class="error hidden"></p>
    <button id="pair-btn" class="btn-primary">Pair Extension</button>
  </div>

  <!-- Connected view (shown when paired) -->
  <div id="connected-view" class="hidden">
    <div class="status">
      <span id="status-dot" class="dot"></span>
      <span id="status-text"></span>
    </div>

    <!-- Active session — needs sharing -->
    <div id="session-share-view" class="hidden">
      <div class="session">
        <div class="service" id="session-share-service"></div>
        <div class="hint" id="session-share-hint"></div>
      </div>
      <p class="status">Click below to share this tab with your agent.</p>
      <button id="share-btn" class="btn-primary" style="font-size:16px; padding:14px;">Share Tab</button>
    </div>

    <!-- Active session — sharing active -->
    <div id="session-view" class="hidden">
      <div class="session">
        <div class="service" id="session-service"></div>
        <div class="hint" id="session-hint"></div>
      </div>
      <p class="status" style="color:#22c55e;">Tab is being shared</p>
      <button id="resolve-btn" class="btn-resolve">Auth Complete — Resolve</button>
    </div>

    <!-- No session -->
    <div id="idle-view">
      <p class="status">Waiting for auth requests from your agent...</p>
    </div>

    <button id="unpair-btn" class="btn-danger">Unpair Extension</button>
  </div>

  <script type="module" src="http://localhost:3001/src/entrypoints/popup/main.ts"></script>
</body>
</html>
